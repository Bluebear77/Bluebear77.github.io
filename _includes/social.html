{% if site.email %}
<a href="mailto:{{ site.email | encode_email }}" title="Email">
  <i class="fas fa-envelope" style="color:#ea4335"></i>
</a>
{% endif %}

{% if site.github_username %}
<a href="https://github.com/{{ site.github_username }}" title="GitHub">
  <i class="fab fa-github" style="color:#181717"></i>
</a>
{% endif %}

{% if site.linkedin_username %}
<a href="https://www.linkedin.com/in/{{ site.linkedin_username }}" title="LinkedIn">
  <i class="fab fa-linkedin" style="color:#0a66c2"></i>
</a>
{% endif %}

{% if site.orcid_id %}
<a href="https://orcid.org/{{ site.orcid_id }}" title="ORCID">
  <i class="ai ai-orcid" style="color:#a6ce39"></i>
</a>
{% endif %}

{% if site.research_gate_profile %}
<a href="https://www.researchgate.net/profile/{{ site.research_gate_profile }}" title="ResearchGate">
  <i class="ai ai-researchgate" style="color:#00ccbb"></i>
</a>
{% endif %}

{% if site.scholar_userid %}
<a href="https://scholar.google.com/citations?user={{ site.scholar_userid }}" title="Google Scholar">
  <i class="fas fa-graduation-cap" style="color:#326ac4"></i>
</a>
{% endif %}
